<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobygame</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="passwordScreen" class="screen active">
            <div class="card">
                <h1>🔐 Enter Password</h1>
                <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
                <button onclick="checkPassword()">Submit</button>
                <p id="passwordError" class="error"></p>
            </div>
        </div>

        <div id="nicknameScreen" class="screen active">
            <div class="card">
                <h1>👤 Enter your Name</h1>
                <input type="text" id="nicknameInput" placeholder="Enter your name" autocomplete="off">
                <button onclick="setNickname()">Submit</button>
                <p id="nicknameError" class="error"></p>
            </div>
        </div>

        <div id="mainMenu" class="screen">
            <div class="card">
                <img src="assets/logo.png" alt="Tobygame Logo" class="logo">
                <div class="menu-buttons">
                    <button id="startbutton" onclick="showScreen('startGameScreen')">Start Game</button>
                    <button onclick="showScreen('addQuestionScreen')">✒️ Add Question</button>
                    <button onclick="showScreen('voteQuestionsScreen')">👍 Vote Questions</button>
                    <button onclick="showScreen('seeQuestionsScreen')">📋 See Questions</button>
                    <button onclick="showScreen('feedbackScreen')">💡 Feedback / Suggestions</button>
                    <button onclick="showScreen('tutorialScreen')">📖 Tutorial</button>
                </div>
            </div>
        </div>

        <div id="addQuestionScreen" class="screen">
            <div class="card">
                <h2>➕ Add Question</h2>
                <textarea id="questionText" placeholder="Enter your question..." rows="4"></textarea>
                <textarea id="scaleText" rows="1">(1 - 10)</textarea>"
                <select id="questionCategory">
                    <option value="🔥 Spicy">🔥 Spicy</option>
                    <option value="😈 Kinky">😈 Kinky</option>
                    <option value="🧨 Explosive group questions">🧨 Explosive group questions</option>
                    <option value="✨ Confidence">✨ Confidence</option>
                    <option value="💕 Love & Dating">💕 Love & Dating</option>
                    <option value="🥂 Party">🥂 Party</option>
                    <option value="💭 Deep / Emotional">💭 Deep / Emotional</option>
                    <option value="✨ Random">✨ Random</option>
                </select>
                <button onclick="addQuestion()">Save Question</button>
                <button class="secondary" onclick="showScreen('mainMenu')">Back</button>
                <p id="addQuestionMessage" class="message"></p>
            </div>
        </div>

        <div id="voteQuestionsScreen" class="screen">
            <div class="card">
                <h2>👍 Vote Questions</h2>
                <div id="voteContent">
                    <div id="voteQuestion" class="question-card"></div>
                    <div class="vote-buttons">
                        <button onclick="vote('like')" class="like-btn">👍 Like</button>
                        <button onclick="vote('dislike')" class="dislike-btn">👎 Dislike</button>
                    </div>
                </div>
                <button class="secondary" onclick="showScreen('mainMenu')">Back to Menu</button>
                <p id="voteMessage" class="message"></p>
            </div>
        </div>

        <div id="seeQuestionsScreen" class="screen">
            <div class="card">
                <h2>📋 All Questions</h2>
                <div id="questionsList"></div>
                    <button class="secondary" onclick="showScreen('mainMenu')">Back</button>
            </div>
        </div>

            <div id="feedbackScreen" class="screen">
                <div class="card">
                    <h2 style="text-align:center;">Feedback / Suggestions</h2>
                    <textarea id="feedbackInput" rows="8" style="width:90%;margin:20px auto;display:block;font-size:1.1em;padding:10px;resize:vertical;max-width:600px;min-height:120px;"></textarea>
                    <div style="text-align:center;margin:10px 0;">
                        <button onclick="sendFeedback()" style="padding:10px 30px;font-size:1.1em;">Send</button>
                        <button onclick="showScreen('mainMenu')" style="padding:10px 30px;font-size:1.1em;">Back</button>
                    </div>
                    <div id="feedbackMessage" style="text-align:center;margin-top:10px;"></div>
                </div>
            </div>

        <div id="startGameScreen" class="screen">
            <div class="card">
                <h2>🎲 Start Game</h2>
                <p>Add players:</p>
                <div id="playersList" class="players-cards-container"></div>
                <div class="player-input-wrapper">
                    <input type="text" id="playerNameInput" placeholder="Enter player name..." autocomplete="off">
                    <button id="addPlayerBtn" class="add-player-btn" onclick="addPlayer()">+</button>
                </div>
                <button onclick="startGame()">Start Game</button>
                <button class="secondary" onclick="showScreen('mainMenu')">Back</button>
                <p id="gameSetupMessage" class="message"></p>
            </div>
        </div>

        <div id="gameScreen" class="screen">
            <div class="game-top-bar-container">
                <div class="game-top-bar">
                    <button class="top-bar-btn" onclick="loadCurrentPlayersForEdit()">✏️ Edit Players</button>
                    <button class="top-bar-btn" onclick="endGame()">❌ End Game</button>
                </div>
            </div>
            <div class="card game-card">
                <div class="game-header">
                    <h3>Current Player:</h3>
                    <h1 id="currentPlayer" class="playername"></h1>
                </div>
                <div class="question-card large" id="gameQuestion">
                    <div class="question-content"></div>
                    <div class="game-vote-bubbles" id="gameVoteButtons">
                        <button onclick="voteInGame('like')" class="vote-bubble like-bubble" title="Like">👍</button>
                        <button onclick="voteInGame('dislike')" class="vote-bubble dislike-bubble" title="Dislike">👎</button>
                    </div>
                </div>
                <button class="skip-btn full-width" onclick="skipQuestion()">Skip Question <span id="skipsLeft">(1 left)</span></button>
                <button onclick="nextQuestion()" class="next-btn-game">Next Player</button>
                <button onclick="toggleChaosModifier()" class="chaos-btn">🔥 Chaos Mode</button>
                <div id="chaosModifierCard" class="chaos-modifier-card" style="display: none;">
                    <div class="chaos-modifier-content">
                        <p id="chaosModifierText"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</div>

    <div id="tutorialScreen" class="screen">
        <div class="card tutorial-card">
            <h2>📖 Tutorial</h2>
            <div class="tutorial-image-container">
                <img id="tutorialImage" src="assets/tutorial/step1.png" alt="Tutorial Step" style="max-width:100%;height:auto;">
            </div>
            <div class="tutorial-text-container">
                <p id="tutorialText">Welcome to the tutorial! Click forward to see the next step.</p>
            </div>
            <div class="tutorial-nav-buttons">
                <button id="tutorialBackBtn">Back</button>
                <button id="tutorialForwardBtn">Forward</button>
            </div>
            <button class="secondary" onclick="showScreen('mainMenu')">Back to Menu</button>
        </div>
    </div>
</body>
</html>
